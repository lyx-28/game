<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>记忆翻牌 - 升级版 v2.0</title>
    <style>
        :root {
            --bg-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-secondary: rgba(255, 255, 255, 0.1);
            --text-primary: white;
            --card-front: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            --card-back: linear-gradient(145deg, #4ecdc4, #45b7aa);
            --card-matched: linear-gradient(145deg, #95e1d3, #77ddbb);
            --btn-bg: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            --accent-color: #667eea;
            --stat-bg: rgba(255, 255, 255, 0.2);
        }
        .theme-ocean {
            --bg-primary: linear-gradient(135deg, #1a5276 0%, #2e86ab 100%);
            --card-front: linear-gradient(145deg, #f39c12, #e67e22);
            --card-back: linear-gradient(145deg, #3498db, #2980b9);
            --card-matched: linear-gradient(145deg, #1abc9c, #16a085);
            --btn-bg: linear-gradient(145deg, #f39c12, #e67e22);
        }
        .theme-forest {
            --bg-primary: linear-gradient(135deg, #1e3c1e 0%, #2d5a2d 100%);
            --card-front: linear-gradient(145deg, #e74c3c, #c0392b);
            --card-back: linear-gradient(145deg, #27ae60, #229954);
            --card-matched: linear-gradient(145deg, #f1c40f, #d4ac0d);
            --btn-bg: linear-gradient(145deg, #e74c3c, #c0392b);
        }
        .theme-sunset {
            --bg-primary: linear-gradient(135deg, #ff7e5f 0%, #feb47b 100%);
            --card-front: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            --card-back: linear-gradient(145deg, #667eea, #764ba2);
            --card-matched: linear-gradient(145deg, #f093fb, #f5576c);
            --btn-bg: linear-gradient(145deg, #ff6b6b, #ee5a5a);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        .game-header {
            text-align: center;
            color: var(--text-primary);
            margin-bottom: 20px;
        }
        .game-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .version-badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: var(--stat-bg);
            padding: 10px 20px;
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
        }
        .stat-item span {
            font-weight: bold;
            font-size: 1.3rem;
        }
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 15px;
        }
        .btn {
            margin: 10px 5px;
            padding: 12px 30px;
            font-size: 1rem;
            background: var(--btn-bg);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .btn:active {
            transform: translateY(0);
        }
        .difficulty-select {
            display: flex;
            gap: 10px;
            align-items: center;
            color: var(--text-primary);
            margin-bottom: 15px;
        }
        .difficulty-select select {
            padding: 8px 15px;
            border-radius: 20px;
            border: none;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }
        .theme-select {
            display: flex;
            gap: 10px;
            align-items: center;
            color: var(--text-primary);
            margin-bottom: 20px;
        }
        .theme-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .theme-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .theme-btn.active {
            border-width: 3px;
            box-shadow: 0 0 15px rgba(255,255,255,0.8);
        }
        .theme-btn.default { background: linear-gradient(135deg, #667eea, #764ba2); }
        .theme-btn.ocean { background: linear-gradient(135deg, #1a5276, #2e86ab); }
        .theme-btn.forest { background: linear-gradient(135deg, #1e3c1e, #2d5a2d); }
        .theme-btn.sunset { background: linear-gradient(135deg, #ff7e5f, #feb47b); }
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .card {
            width: 100px;
            height: 100px;
            perspective: 1000px;
            cursor: pointer;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card.flipped .card-inner,
        .card.matched .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .card-front {
            background: var(--card-front);
        }
        .card-front::after {
            content: "?";
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }
        .card-back {
            background: var(--card-back);
            transform: rotateY(180deg);
        }
        .card.matched .card-back {
            background: var(--card-matched);
            box-shadow: 0 0 20px rgba(100,255,150,0.5);
        }
        .card.matched {
            cursor: default;
        }
        .card.shake {
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .card.pop {
            animation: pop 0.3s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .score-float {
            position: fixed;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 1000;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.2); }
        }
        .instructions {
            margin-top: 20px;
            color: rgba(255,255,255,0.9);
            text-align: center;
            max-width: 400px;
            line-height: 1.6;
        }
        .leaderboard {
            margin-top: 20px;
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            max-width: 300px;
            width: 100%;
        }
        .leaderboard h3 {
            color: var(--text-primary);
            margin-bottom: 15px;
            text-align: center;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 15px;
            color: var(--text-primary);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .leaderboard-item:last-child {
            border-bottom: none;
        }
        .leaderboard-item .rank {
            font-weight: bold;
            color: #ffd700;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            animation: modalIn 0.3s ease-out;
        }
        @keyframes modalIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-content h2 {
            color: var(--accent-color);
            font-size: 2rem;
            margin-bottom: 15px;
        }
        .modal-content p {
            color: #666;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .modal-content .final-score {
            font-size: 3rem;
            color: #ff6b6b;
            font-weight: bold;
            margin: 15px 0;
        }
        .modal-content .high-score {
            font-size: 1rem;
            color: #888;
            margin-bottom: 15px;
        }
        .pause-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }
        .pause-overlay.show {
            display: flex;
        }
        .pause-text {
            font-size: 3rem;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @media (max-width: 500px) {
            .card {
                width: 70px;
                height: 70px;
            }
            .card-front::after {
                font-size: 1.5rem;
            }
            .card-back {
                font-size: 1.8rem;
            }
            .game-board {
                gap: 10px;
                padding: 15px;
            }
            .game-header h1 {
                font-size: 1.8rem;
            }
            .stats {
                gap: 15px;
            }
            .stat-item {
                padding: 8px 15px;
                font-size: 0.9rem;
            }
            .controls {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <div class="game-header">
        <h1>🧠 记忆翻牌</h1>
        <span class="version-badge">升级版 v2.0</span>
    </div>
    <div class="stats">
        <div class="stat-item">用时: <span id="timer">00:00</span></div>
        <div class="stat-item">步数: <span id="moves">0</span></div>
        <div class="stat-item">得分: <span id="score">0</span></div>
    </div>
    <div class="controls">
        <button class="btn" id="pauseBtn" style="display: none;">暂停</button>
        <button class="btn" id="restartBtn">重新开始</button>
    </div>
    <div class="difficulty-select">
        <label for="difficulty">难度:</label>
        <select id="difficulty">
            <option value="easy">简单 (4x3)</option>
            <option value="normal" selected>普通 (4x4)</option>
            <option value="hard">困难 (4x5)</option>
        </select>
    </div>
    <div class="theme-select">
        <span>主题:</span>
        <button class="theme-btn default active" data-theme="" title="默认"></button>
        <button class="theme-btn ocean" data-theme="theme-ocean" title="海洋"></button>
        <button class="theme-btn forest" data-theme="theme-forest" title="森林"></button>
        <button class="theme-btn sunset" data-theme="theme-sunset" title="日落"></button>
    </div>
    <div class="game-board" id="gameBoard"></div>
    <div class="instructions">
        <p>👆 点击卡片进行翻转</p>
        <p>🔄 匹配两张相同的卡片即可消除</p>
        <p>🏆 在最短时间内用最少的步数完成挑战！</p>
    </div>
    <div class="leaderboard" id="leaderboard" style="display: none;">
        <h3>🏅 排行榜</h3>
        <div id="leaderboardContent"></div>
    </div>
    <div class="pause-overlay" id="pauseOverlay">
        <div class="pause-text">游戏暂停</div>
    </div>
    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2 id="modalTitle">恭喜通关！</h2>
            <p>你完成了游戏！</p>
            <div class="final-score" id="finalScore">0</div>
            <p>最终得分</p>
            <p class="high-score" id="highScoreDisplay" style="display: none;">最高分: 0</p>
            <button class="btn" id="playAgainBtn">再玩一次</button>
        </div>
    </div>
    <script>
        const cardSymbols = ['🍎', '🍊', '🍋', '🍇', '🍓', '🍒', '🥝', '🍑', '🐶', '🐱', '🐼', '🦁'];
        
        const difficultyConfig = {
            easy: { cols: 4, rows: 3, pairs: 6 },
            normal: { cols: 4, rows: 4, pairs: 8 },
            hard: { cols: 4, rows: 5, pairs: 10 }
        };
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let score = 0;
        let seconds = 0;
        let timerInterval = null;
        let gameStarted = false;
        let gameEnded = false;
        let isPaused = false;
        let canFlip = true;
        let difficulty = 'normal';
        let highScore = 0;
        let leaderboard = [];
        let currentTheme = '';
        let audioContext = null;
        let soundEnabled = true;
        const gameBoard = document.getElementById('gameBoard');
        const timerDisplay = document.getElementById('timer');
        const movesDisplay = document.getElementById('moves');
        const scoreDisplay = document.getElementById('score');
        const winModal = document.getElementById('winModal');
        const finalScoreDisplay = document.getElementById('finalScore');
        const highScoreDisplay = document.getElementById('highScoreDisplay');
        const restartBtn = document.getElementById('restartBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const playAgainBtn = document.getElementById('playAgainBtn');
        const difficultySelect = document.getElementById('difficulty');
        const themeButtons = document.querySelectorAll('.theme-btn');
        const leaderboardEl = document.getElementById('leaderboard');
        const leaderboardContent = document.getElementById('leaderboardContent');
        const pauseOverlay = document.getElementById('pauseOverlay');
        function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {
                console.log('Audio not supported');
            }
        }
        function playSound(freq, duration, type = 'sine') {
            if (!soundEnabled || !audioContext) return;
            try {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.frequency.value = freq;
                oscillator.type = type;
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + duration);
            } catch (e) {}
        }
        function playFlipSound() { playSound(440, 0.1); }
        function playMatchSound() { playSound(523, 0.15); playSound(659, 0.15); }
        function playMismatchSound() { playSound(200, 0.2, 'square'); }
        function playWinSound() {
            playSound(523, 0.1); playSound(659, 0.1); playSound(784, 0.1); playSound(1047, 0.2);
        }
        function shuffle(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        function startTimer() {
            if (!gameStarted) {
                gameStarted = true;
                timerInterval = setInterval(() => {
                    if (!isPaused && !gameEnded) {
                        seconds++;
                        timerDisplay.textContent = formatTime(seconds);
                    }
                }, 1000);
            }
        }
        function stopTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        function calculateScore() {
            const timeBonus = Math.max(0, 1500 - seconds * 3);
            const movesPenalty = moves * 8;
            score = Math.max(0, 800 + timeBonus - movesPenalty + matchedPairs * 150);
            scoreDisplay.textContent = score;
        }
        function showScoreFloat(x, y, text) {
            const float = document.createElement('div');
            float.className = 'score-float';
            float.textContent = text;
            float.style.left = x + 'px';
            float.style.top = y + 'px';
            document.body.appendChild(float);
            setTimeout(() => float.remove(), 1000);
        }
        function createCard(symbol, index) {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.symbol = symbol;
            card.dataset.index = index;
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-front"></div>
                    <div class="card-back">${symbol}</div>
                </div>
            `;
            card.addEventListener('click', () => flipCard(card));
            return card;
        }
        function flipCard(card) {
            if (!canFlip || isPaused || gameEnded) return;
            if (card.classList.contains('flipped')) return;
            if (card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;
            if (!audioContext) initAudio();
            playFlipSound();
            card.classList.add('flipped', 'pop');
            setTimeout(() => card.classList.remove('pop'), 300);
            flippedCards.push(card);
            if (flippedCards.length === 2) {
                moves++;
                movesDisplay.textContent = moves;
                checkMatch();
            }
        }
        function checkMatch() {
            canFlip = false;
            const [card1, card2] = flippedCards;
            const match = card1.dataset.symbol === card2.dataset.symbol;
            if (match) {
                handleMatch(card1, card2);
            } else {
                handleMismatch(card1, card2);
            }
        }
        function handleMatch(card1, card2) {
            playMatchSound();
            setTimeout(() => {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                calculateScore();
                const rect = card1.getBoundingClientRect();
                showScoreFloat(rect.left + rect.width/2, rect.top, '+' + (100 + (difficulty === 'hard' ? 50 : difficulty === 'easy' ? -25 : 0)));
                flippedCards = [];
                canFlip = true;
                const config = difficultyConfig[difficulty];
                if (matchedPairs === config.pairs) {
                    setTimeout(showWinModal, 500);
                }
            }, 300);
        }
        function handleMismatch(card1, card2) {
            playMismatchSound();
            card1.classList.add('shake');
            card2.classList.add('shake');
            setTimeout(() => {
                card1.classList.remove('flipped', 'shake');
                card2.classList.remove('flipped', 'shake');
                flippedCards = [];
                canFlip = true;
            }, 800);
        }
        function showWinModal() {
            stopTimer();
            gameEnded = true;
            playWinSound();
            calculateScore();
            finalScoreDisplay.textContent = score;
            if (score > highScore) {
                highScore = score;
                highScoreDisplay.textContent = '最高分: ' + highScore;
                highScoreDisplay.style.display = 'block';
                saveHighScore();
            }
            updateLeaderboard();
            leaderboardEl.style.display = 'block';
            winModal.classList.add('show');
        }
        function hideWinModal() {
            winModal.classList.remove('show');
        }
        function loadHighScore() {
            highScore = parseInt(localStorage.getItem('memoryGameHighScore_' + difficulty) || '0');
        }
        function saveHighScore() {
            localStorage.setItem('memoryGameHighScore_' + difficulty, highScore.toString());
        }
        function loadLeaderboard() {
            const data = localStorage.getItem('memoryGameLeaderboard_' + difficulty);
            leaderboard = data ? JSON.parse(data) : [];
        }
        function saveLeaderboard() {
            localStorage.setItem('memoryGameLeaderboard_' + difficulty, JSON.stringify(leaderboard));
        }
        function updateLeaderboard() {
            leaderboard.push({ score, date: new Date().toLocaleDateString() });
            leaderboard.sort((a, b) => b.score - a.score);
            leaderboard = leaderboard.slice(0, 5);
            saveLeaderboard();
            leaderboardContent.innerHTML = leaderboard.map((item, i) => `
                <div class="leaderboard-item">
                    <span class="rank">#${i + 1}</span>
                    <span>${item.score}</span>
                    <span>${item.date}</span>
                </div>
            `).join('');
        }
        function togglePause() {
            isPaused = !isPaused;
            pauseOverlay.classList.toggle('show', isPaused);
            pauseBtn.textContent = isPaused ? '继续' : '暂停';
        }
        function setDifficulty(newDifficulty) {
            difficulty = newDifficulty;
            loadHighScore();
            loadLeaderboard();
            initGame();
        }
        function setTheme(theme) {
            currentTheme = theme;
            document.body.className = theme ? theme : '';
            themeButtons.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.theme === theme);
            });
        }
        function initGame() {
            gameBoard.innerHTML = '';
            cards = [];
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            score = 0;
            seconds = 0;
            gameStarted = false;
            gameEnded = false;
            isPaused = false;
            canFlip = true;
            stopTimer();
            timerDisplay.textContent = '00:00';
            movesDisplay.textContent = '0';
            scoreDisplay.textContent = '0';
            hideWinModal();
            pauseOverlay.classList.remove('show');
            pauseBtn.style.display = 'none';
            pauseBtn.textContent = '暂停';
            const config = difficultyConfig[difficulty];
            gameBoard.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
            const selectedSymbols = cardSymbols.slice(0, config.pairs);
            const cardPairs = [...selectedSymbols, ...selectedSymbols];
            const shuffledCards = shuffle(cardPairs);
            shuffledCards.forEach((symbol, index) => {
                const card = createCard(symbol, index);
                cards.push(card);
                gameBoard.appendChild(card);
            });
            loadHighScore();
            if (highScore > 0) {
                highScoreDisplay.textContent = '最高分: ' + highScore;
                highScoreDisplay.style.display = 'block';
            }
            loadLeaderboard();
            if (leaderboard.length > 0) {
                updateLeaderboard();
                leaderboardEl.style.display = 'block';
            }
        }
        restartBtn.addEventListener('click', initGame);
        pauseBtn.addEventListener('click', togglePause);
        playAgainBtn.addEventListener('click', initGame);
        difficultySelect.addEventListener('change', (e) => setDifficulty(e.target.value));
        themeButtons.forEach(btn => {
            btn.addEventListener('click', () => setTheme(btn.dataset.theme));
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'p' || e.key === 'P') {
                if (gameStarted && !gameEnded) togglePause();
            }
        });
        initGame();
    </script>
</body>
</html>
